services:
  uniclaudeproxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniclaudeproxy
    restart: unless-stopped
    ports:
      - "9223:9223"
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9223/health', timeout=5).read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
